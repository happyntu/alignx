name: phase1_view_chr1_samtools
phase: v0.1
description: Compare alignx view against samtools view on a caller-provided chr1 BAM interval.

dataset:
  bam: ${ALIGNX_BENCH_BAM}
  bai: ${ALIGNX_BENCH_BAM}.bai
  reference: chr1
  remote_example_bam: /mypool/biotools-benchmark-data/hg002_downloads/HG002.SequelII.merged_15kb_20kb.pbmm2.GRCh38.haplotag.10x.bam
  policy:
    - Do not commit large BAM/CRAM datasets.
    - Provide the BAM path locally through ALIGNX_BENCH_BAM or --input.
    - Prefer missmi-server00 /mypool storage for HG002 and other large-data runs.
    - Run timing repeats only after explicit user confirmation.

query:
  region: chr1:1000000-2000000
  warmup: 1
  repeats: 5

tools:
  alignx:
    binary: build/wsl-release/alignx
    commands:
      - index
      - view
  samtools:
    binary: samtools
    command: view

metrics:
  - run_id
  - wall_time_ms
  - exit_code
  - stdout_bytes
  - stdout_diff_vs_samtools
  - axf_index_preflight
  - avg_ms
  - median_ms
  - p95_ms
  - max_over_median
  - outlier_runs_2x_median

outputs:
  raw_tsv: benchmarks/results/phase1_view_chr1_samtools.tsv
  summary_tsv: benchmarks/results/phase1_view_chr1_samtools.summary.tsv
  remote_raw_tsv: /mypool/alignx/results/phase1_view_chr1_samtools.tsv
  remote_summary_tsv: /mypool/alignx/results/phase1_view_chr1_samtools.summary.tsv
  axf_index: temporary unless --axf-index-output is provided

notes:
  - Intended for WSL/Conda Phase 1 real-data benchmarking.
  - Run scripts/check_benchmark_input.sh before timing a caller-provided BAM.
  - check_benchmark_input.sh is preflight only; bench_region_query.sh performs timed repeats.
  - The benchmark script runs alignx index before timed view commands; this is preflight only, not part of the measured view latency.
  - The benchmark script fails if alignx stdout differs from samtools stdout.
  - On missmi-server00, use /mypool/alignx/bin/alignx and write raw/summary TSVs under /mypool/alignx/results/.
  - |
    Example:
      scripts/check_benchmark_input.sh --alignx build/wsl-release/alignx --input "$ALIGNX_BENCH_BAM" --region chr1:1000000-2000000
      scripts/bench_region_query.sh --alignx build/wsl-release/alignx --input "$ALIGNX_BENCH_BAM" --region chr1:1000000-2000000 --warmup 1 --repeats 5 --output benchmarks/results/phase1_view_chr1_samtools.tsv
