name: phase1_view_chr1_samtools
phase: v0.1
description: Compare alignx view against samtools view on a caller-provided chr1 BAM interval.

dataset:
  bam: ${ALIGNX_BENCH_BAM}
  bai: ${ALIGNX_BENCH_BAM}.bai
  reference: chr1
  policy:
    - Do not commit large BAM/CRAM datasets.
    - Provide the BAM path locally through ALIGNX_BENCH_BAM or --input.

query:
  region: chr1:1000000-2000000
  warmup: 1
  repeats: 5

tools:
  alignx:
    binary: build/wsl-debug/alignx
    command: view
  samtools:
    binary: samtools
    command: view

metrics:
  - run_id
  - wall_time_ms
  - exit_code
  - stdout_bytes
  - stdout_diff_vs_samtools

outputs:
  raw_tsv: benchmarks/results/phase1_view_chr1_samtools.tsv

notes:
  - Intended for WSL/Conda Phase 1 real-data benchmarking.
  - The benchmark script fails if alignx stdout differs from samtools stdout.
  - |
    Example:
      scripts/bench_region_query.sh --input "$ALIGNX_BENCH_BAM" --region chr1:1000000-2000000 --warmup 1 --repeats 5 --output benchmarks/results/phase1_view_chr1_samtools.tsv
