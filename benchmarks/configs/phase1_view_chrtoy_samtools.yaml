name: phase1_view_chrtoy_samtools
phase: v0.1
description: Compare alignx view against samtools view on the synthetic chrToy fixture.

dataset:
  sam: tests/toy_data/toy_alignment.sam
  bam: tests/toy_data/toy_alignment.sorted.bam
  bai: tests/toy_data/toy_alignment.sorted.bam.bai
  csi: tests/toy_data/toy_alignment.sorted.bam.csi
  reference: chrToy

query:
  region: chrToy:1-250
  warmup: 1
  repeats: 5

tools:
  alignx:
    binary: build/wsl-release/alignx
    commands:
      - index
      - view
  samtools:
    binary: samtools
    command: view

metrics:
  - run_id
  - wall_time_ms
  - exit_code
  - stdout_bytes
  - stdout_diff_vs_samtools
  - axf_index_preflight
  - avg_ms
  - median_ms
  - p95_ms
  - max_over_median
  - outlier_runs_2x_median

outputs:
  raw_tsv: benchmarks/results/phase1_view_chrtoy_samtools.tsv
  summary_tsv: benchmarks/results/phase1_view_chrtoy_samtools.summary.tsv
  axf_index: temporary unless --axf-index-output is provided

notes:
  - Intended for WSL/Conda Phase 1 smoke benchmarking.
  - The benchmark script runs alignx index before timed view commands; this is preflight only, not part of the measured view latency.
  - The benchmark script fails if alignx stdout differs from samtools stdout.
